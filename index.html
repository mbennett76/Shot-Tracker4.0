// ── PDF Report Generator ───────────────────────────────────────────────────────
function generateReport(sessions,players,teamMeta){
  // Collect all sessions for same game (keyed by label+date+opponent)
  var gameSessions=sessions.filter(function(s){return s.sessionType==='Game';});
  if(!gameSessions.length) return;
  // Group by game identifier
  var key=gameSessions[0].label+'|'+gameSessions[0].date+'|'+gameSessions[0].opponent;
  var gameSess=gameSessions.filter(function(s){return (s.label+'|'+s.date+'|'+s.opponent)===key;});
  var numP=gameSess[0].numPeriods||4;
  var pN=getPeriodNames(numP);
  var gameScore=gameSess[0].gameScore||{my:0,opp:0};
  var opp=gameSess[0].opponent||'Opponent';
  var gDate=fmtDate(gameSess[0].date);
  var oppData=gameSess[0].opponentData||{total:EMPTY_OPP(),quarters:[]};
  var oppTot=oppData.total||EMPTY_OPP();

  // Build per-player rows
  function calcPct(m,a){return a>0?Math.round(m/a*100)+'%':'—';}
  function fgStr(sh){var m=sh.filter(function(s){return s.make;}).length;return m+'-'+sh.length;}
  function ftStr(ft){var m=ft.filter(function(s){return s.make;}).length;return m+'-'+ft.length;}

  var rows=[];
  var teamTotals={pts:0,pf:0,fg2m:0,fg2a:0,fg3m:0,fg3a:0,ftm:0,fta:0,to:0,oReb:0,dReb:0,ast:0,stl:0,blk:0};
  players.forEach(function(p){
    var sess=gameSess.find(function(s){return s.playerId===p.id;});
    if(!sess) return;
    var sh=sess.shots||[];
    var ft=sess.ftShots||[];
    var fg2sh=sh.filter(function(s){return s.type!=='3-Pointer';});
    var fg3sh=sh.filter(function(s){return s.type==='3-Pointer';});
    var fg2m=fg2sh.filter(function(s){return s.make;}).length;
    var fg3m=fg3sh.filter(function(s){return s.make;}).length;
    var ftm=ft.filter(function(s){return s.make;}).length;
    var pts=fg2m*2+fg3m*3+ftm;
    var row={
      num:p.number,name:p.name||'',
      pts:pts,pf:sess.foul||0,
      fgStr:fgStr(sh),fg2Str:fg2m+'-'+fg2sh.length,fg3Str:fg3m+'-'+fg3sh.length,ftStr:ftStr(ft),
      to:sess.to||0,oReb:sess.oReb||0,dReb:sess.dReb||0,reb:(sess.oReb||0)+(sess.dReb||0),
      ast:sess.ast||0,stl:sess.stl||0,blk:sess.blk||0,pm:sess.plusMinus!=null?sess.plusMinus:0
    };
    teamTotals.pts+=row.pts;teamTotals.pf+=row.pf;
    teamTotals.fg2m+=fg2m;teamTotals.fg2a+=fg2sh.length;
    teamTotals.fg3m+=fg3m;teamTotals.fg3a+=fg3sh.length;
    teamTotals.ftm+=ftm;teamTotals.fta+=ft.length;
    teamTotals.to+=row.to;teamTotals.oReb+=row.oReb;teamTotals.dReb+=row.dReb;
    teamTotals.ast+=row.ast;teamTotals.stl+=row.stl;teamTotals.blk+=row.blk;
    rows.push(row);
  });
  rows.sort(function(a,b){return parseNum(a.num)-parseNum(b.num);});

  // Period score breakdown
  function periodScore(sessArr,idx){
    return sessArr.reduce(function(t,s){
      var qd=(s.quarterData||[])[idx]||EMPTY_QSTAT();
      return t+calcPts(qd.shots||[],qd.ftShots||[]);
    },0);
  }
  function oppPeriodScore(idx){
    var qd=(oppData.quarters||[])[idx]||EMPTY_OPP();
    return oppQPts(qd);
  }

  // Shot chart SVG for a player
  function shotChartSVG(sess){
    var sh=sess.shots||[];
    var ft=sess.ftShots||[];
    var scale=320/CW;
    var ch=Math.round(CH*scale);
    var dots=sh.map(function(s){
      var x=Math.round(s.x*scale);
      var y=Math.round(s.y*scale);
      return s.make
        ?'<circle cx="'+x+'" cy="'+y+'" r="5" fill="#1e3a5f" opacity="0.85"/>'
        :'<circle cx="'+x+'" cy="'+y+'" r="5" fill="none" stroke="#1e3a5f" stroke-width="2" opacity="0.75"/>';
    }).join('');
    // FT dots mapped to foul line position on scaled court
    var ftX=Math.round(BX*scale);
    var ftY=Math.round(FT_Y*scale);
    var ftDots=ft.map(function(s,i){
      var ox=(i%2===0?-1:1)*(6+Math.floor(i/2)*14);
      return s.make
        ?'<rect x="'+(ftX+ox-5)+'" y="'+(ftY-5)+'" width="10" height="10" rx="1" fill="#1e3a5f" opacity="0.85" transform="rotate(45 '+(ftX+ox)+' '+ftY+')"/>'
        :'<rect x="'+(ftX+ox-5)+'" y="'+(ftY-5)+'" width="10" height="10" rx="1" fill="none" stroke="#1e3a5f" stroke-width="2" opacity="0.75" transform="rotate(45 '+(ftX+ox)+' '+ftY+')"/>';
    }).join('');
    // Court lines scaled
    var kL=Math.round(KEY_L*scale),kR=Math.round(KEY_R*scale);
    var ftYs=Math.round(FT_Y*scale),byS=Math.round(BY*scale),bxS=Math.round(BX*scale);
    var corL=Math.round(COR_X_L*scale),corR=Math.round(COR_X_R*scale);
    var corArcY=Math.round(COR_ARC_Y*scale);
    var threeR=Math.round(THREE_R*scale),ftR=Math.round(FT_R*scale);
    var basY=Math.round((BY+10)*scale);
    return '<svg viewBox="0 0 320 '+ch+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;border-radius:6px;">'+
      '<rect width="320" height="'+ch+'" fill="#C9964D"/>'+
      '<rect x="'+kL+'" y="'+ftYs+'" width="'+(kR-kL)+'" height="'+(byS-ftYs)+'" fill="rgba(255,255,255,0.12)" stroke="white" stroke-width="1"/>'+
      '<path d="M '+kL+' '+ftYs+' A '+ftR+' '+ftR+' 0 0 0 '+kR+' '+ftYs+'" stroke="white" stroke-width="1" fill="none"/>'+
      '<path d="M '+kL+' '+ftYs+' A '+ftR+' '+ftR+' 0 0 1 '+kR+' '+ftYs+'" stroke="white" stroke-width="1" fill="none" stroke-dasharray="4 3"/>'+
      '<circle cx="'+bxS+'" cy="'+byS+'" r="'+Math.round(11*scale)+'" fill="none" stroke="white" stroke-width="1"/>'+
      '<path d="M '+corL+' '+basY+' A '+threeR+' '+threeR+' 0 0 1 '+corR+' '+basY+'" stroke="white" stroke-width="1" fill="none"/>'+
      '<line x1="'+corL+'" y1="'+basY+'" x2="'+corL+'" y2="'+corArcY+'" stroke="white" stroke-width="1"/>'+

  // Build HTML
  var periodHeaders=pN.map(function(n){return '<th style="width:50px">'+n+'</th>';}).join('');
  var myPeriodCells=pN.map(function(n,i){return '<td style="text-align:center;font-weight:500;">'+periodScore(gameSess,i)+'</td>';}).join('');
  var oppPeriodCells=pN.map(function(n,i){return '<td style="text-align:center;">'+oppPeriodScore(i)+'</td>';}).join('');

  var playerRows=rows.map(function(r){
    var pmStr=r.pm>0?'+'+r.pm:(r.pm===0?'0':String(r.pm));
    var pmColor=r.pm>0?'#16a34a':r.pm<0?'#dc2626':'#374151';

  var totPmStr='0';
  var totFgStr=teamTotals.fg2m+teamTotals.fg3m+'-'+(teamTotals.fg2a+teamTotals.fg3a);
  var totFg3Str=teamTotals.fg3m+'-'+teamTotals.fg3a;
  var totFtStr=teamTotals.ftm+'-'+teamTotals.fta;
  var totReb=teamTotals.oReb+teamTotals.dReb;

  var oppFgStr=(oppTot.fg2m+oppTot.fg3m)+'-'+(oppTot.fg2a+oppTot.fg3a);
  var oppFg3Str=oppTot.fg3m+'-'+oppTot.fg3a;
  var oppFtStr=oppTot.ftm+'-'+oppTot.fta;
  var oppReb=(oppTot.oReb||0)+(oppTot.dReb||0);

  // Fouls by period
  function teamFoulsPeriod(idx){return gameSess.reduce(function(t,s){return t+((s.quarterData||[])[idx]?((s.quarterData[idx].foul)||0):0);},0);}
  function oppFoulsPeriod(idx){return (oppData.quarters||[])[idx]?(oppData.quarters[idx].foul||0):0;}
  var foulRows=pN.map(function(n,i){return '<td style="text-align:center;">'+teamFoulsPeriod(i)+'</td><td style="text-align:center;">'+oppFoulsPeriod(i)+'</td>';}).join('');

  // Individual player pages
  var playerPages=gameSess.map(function(sess){
    var p=players.find(function(pl){return pl.id===sess.playerId;});
    if(!p) return '';
    var sh=sess.shots||[];
    var ft=sess.ftShots||[];
    var fg2sh=sh.filter(function(s){return s.type!=='3-Pointer';});
    var fg3sh=sh.filter(function(s){return s.type==='3-Pointer';});
    var fg2m=fg2sh.filter(function(s){return s.make;}).length;
    var fg3m=fg3sh.filter(function(s){return s.make;}).length;
    var ftm=ft.filter(function(s){return s.make;}).length;
    var pts=fg2m*2+fg3m*3+ftm;
    var pm=sess.plusMinus!=null?sess.plusMinus:0;
    var pmStr=pm>0?'+'+pm:(pm===0?'0':String(pm));
    var pmColor=pm>0?'#16a34a':pm<0?'#dc2626':'#374151';
    var dispName=(p.name||'')+(p.name?', ':'')+'#'+p.number;
    return '<div class="page player-page">'+
      '<div class="player-header">'+
        '<div class="player-num">#'+p.number+'</div>'+
        '<div class="player-info"><div class="p-name">'+dispName+'</div>'+
        '<div class="p-meta">'+teamMeta.name+' · vs '+opp+' · '+gDate+'</div></div>'+
      '</div>'+
      '<div class="stat-pills">'+
        '<div class="pill">PTS <span>'+pts+'</span></div>'+
        '<div class="pill">FG <span>'+fgStr(sh)+' ('+calcPct(sh.filter(function(s){return s.make;}).length,sh.length)+')</span></div>'+
        '<div class="pill">3PT <span>'+fg3m+'-'+fg3sh.length+' ('+calcPct(fg3m,fg3sh.length)+')</span></div>'+
        '<div class="pill">FT <span>'+ftStr(ft)+' ('+calcPct(ftm,ft.length)+')</span></div>'+
        '<div class="pill">REB <span>'+((sess.oReb||0)+(sess.dReb||0))+'</span></div>'+
        '<div class="pill">ORB <span>'+(sess.oReb||0)+'</span></div>'+
        '<div class="pill">DRB <span>'+(sess.dReb||0)+'</span></div>'+
        '<div class="pill">AST <span>'+(sess.ast||0)+'</span></div>'+
        '<div class="pill">STL <span>'+(sess.stl||0)+'</span></div>'+
        '<div class="pill">BLK <span>'+(sess.blk||0)+'</span></div>'+
        '<div class="pill">TO <span>'+(sess.to||0)+'</span></div>'+
        '<div class="pill">PF <span>'+(sess.foul||0)+'</span></div>'+
        '<div class="pill">+/&minus; <span style="color:'+pmColor+'">'+pmStr+'</span></div>'+
      '</div>'+
      '<div class="chart-label">Shot chart</div>'+
      '<div class="chart-legend">'+
        '<svg width="10" height="10"><circle cx="5" cy="5" r="4" fill="#1e3a5f"/></svg> Make &nbsp;'+
        '<svg width="10" height="10"><circle cx="5" cy="5" r="4" fill="none" stroke="#1e3a5f" stroke-width="1.5"/></svg> Miss &nbsp;'+
        '<svg width="10" height="10" style="margin-left:4px"><rect x="1" y="1" width="8" height="8" rx="1" fill="#1e3a5f" transform="rotate(45 5 5)"/></svg> FT'+
      '</div>'+
      shotChartSVG(sess)+
      '<div class="shot-breakdown">'+
        '<div class="sb-cell"><div class="sb-label">2PT</div><div class="sb-val">'+fg2m+'-'+fg2sh.length+'</div><div class="sb-pct">'+calcPct(fg2m,fg2sh.length)+'</div></div>'+
        '<div class="sb-cell"><div class="sb-label">3PT</div><div class="sb-val">'+fg3m+'-'+fg3sh.length+'</div><div class="sb-pct">'+calcPct(fg3m,fg3sh.length)+'</div></div>'+
        '<div class="sb-cell"><div class="sb-label">FT</div><div class="sb-val">'+ftStr(ft)+'</div><div class="sb-pct">'+calcPct(ftm,ft.length)+'</div></div>'+
      '</div>'+
      '<div class="footer"><div class="brand">ShotTracker 4.0</div><div class="date">Generated '+new Date().toLocaleDateString()+'</div></div>'+
    '</div>';
  }).join('');

  var html='<!DOCTYPE html><html><head><meta charset="utf-8">'+
  '<meta name="viewport" content="width=device-width,initial-scale=1">'+
  '<title>'+teamMeta.name+' vs '+opp+' — Game Report</title>'+
  '<style>'+
    '*{box-sizing:border-box;margin:0;padding:0;font-family:Helvetica Neue,Arial,sans-serif;}'+
    'body{background:#f0f0f0;padding:20px;}'+
    '.page{width:700px;background:#fff;margin:0 auto 30px;padding:32px 36px;border-radius:8px;page-break-after:always;}'+
    '@media print{body{background:#fff;padding:0;}.page{width:100%;box-shadow:none;border-radius:0;margin:0;padding:24px 20px;page-break-after:always;}}'+

    'h2{font-size:14px;font-weight:600;color:#111;margin-bottom:10px;}'+
    'h3{font-size:11px;color:#6b7280;text-align:center;margin-bottom:18px;font-weight:400;}'+
    'table{width:100%;border-collapse:collapse;font-size:11.5px;}'+
    'th{font-size:10px;font-weight:600;color:#6b7280;text-align:center;padding:5px 4px;border-bottom:1px solid #e5e7eb;}'+
    'th.left{text-align:left;}td{text-align:center;padding:5px 4px;color:#111;border-bottom:1px solid #f3f4f6;}'+
    'td.left{text-align:left;padding-left:8px;}tr.totals td{font-weight:600;border-top:1.5px solid #d1d5db;background:#f9fafb;}'+
    '.score-box{display:grid;grid-template-columns:1fr repeat('+(numP+1)+',60px);border:1px solid #e5e7eb;border-radius:6px;overflow:hidden;margin-bottom:22px;}'+
    '.sb-head{font-size:10px;font-weight:600;color:#6b7280;background:#f9fafb;padding:7px;text-align:center;border-bottom:1px solid #e5e7eb;}'+
    '.sb-cell-s{padding:8px;font-size:13px;color:#111;border-bottom:1px solid #f3f4f6;}'+
    '.sb-total{font-weight:700;font-size:16px;}'+
    'hr{border:none;border-top:1px solid #e5e7eb;margin:20px 0;}'+
    '.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:4px;}'+
    '.mini-box{background:#f9fafb;border-radius:6px;padding:12px 14px;}'+
    '.mini-box h4{font-size:10px;font-weight:600;color:#6b7280;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}'+
    '.footer{margin-top:22px;padding-top:14px;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;}'+
    '.brand{font-size:11px;font-weight:600;color:#6b7280;letter-spacing:2px;text-transform:uppercase;}'+
    '.date{font-size:11px;color:#9ca3af;}'+
    '.player-page{}'+
    '.player-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;}'+
    '.player-num{width:50px;height:50px;border-radius:50%;background:#1e3a5f;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:#fff;flex-shrink:0;}'+
    '.p-name{font-size:16px;font-weight:600;color:#111;}.p-meta{font-size:11px;color:#6b7280;margin-top:2px;}'+
    '.stat-pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}'+
    '.pill{background:#f3f4f6;border-radius:20px;padding:4px 11px;font-size:11.5px;color:#6b7280;}'+
    '.pill span{font-weight:600;color:#111;}'+
    '.chart-label{font-size:13px;font-weight:600;color:#111;margin-bottom:6px;}'+
    '.chart-legend{display:flex;align-items:center;gap:6px;font-size:10.5px;color:#6b7280;margin-bottom:8px;}'+
    '.shot-breakdown{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px;}'+
    '.sb-cell{background:#f9fafb;border-radius:6px;padding:10px;text-align:center;}'+
    '.sb-label{font-size:9px;color:#6b7280;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}'+
    '.sb-val{font-size:17px;font-weight:600;color:#111;}.sb-pct{font-size:11px;color:#6b7280;}'+
  '</style></head><body>'+
  '<div class="page">'+
    '<h1>'+teamMeta.name+' <strong>'+gameScore.my+'</strong> &ndash; '+opp+' <strong>'+gameScore.opp+'</strong></h1>'+
    '<h3>'+gDate+' · ShotTracker 4.0</h3>'+
    '<div class="score-box">'+
      '<div class="sb-head" style="text-align:left;padding-left:12px;"></div>'+
      pN.map(function(n){return '<div class="sb-head">'+n+'</div>';}).join('')+
      '<div class="sb-head" style="font-weight:700;color:#111;">T</div>'+
      '<div class="sb-cell-s" style="padding-left:12px;font-weight:600;">'+teamMeta.name+'</div>'+
      myPeriodCells+
      '<div class="sb-cell-s sb-total" style="text-align:center;">'+gameScore.my+'</div>'+
      '<div class="sb-cell-s" style="padding-left:12px;">'+opp+'</div>'+
      oppPeriodCells+
      '<div class="sb-cell-s sb-total" style="text-align:center;">'+gameScore.opp+'</div>'+
    '</div>'+
    '<h2>'+teamMeta.name+'</h2>'+
    '<table><thead><tr>'+
      '<th class="left" style="min-width:120px;">Player</th>'+
      '<th>PTS</th><th>PF</th><th>FG</th><th>3PT</th><th>FT</th>'+
      '<th>TO</th><th>ORB</th><th>DRB</th><th>REB</th>'+
      '<th>AST</th><th>STL</th><th>BLK</th><th>+/&minus;</th>'+
    '</tr></thead><tbody>'+
    playerRows+
    '<tr class="totals">'+
      '<td class="left">Totals</td>'+
      '<td>'+teamTotals.pts+'</td><td>'+teamTotals.pf+'</td>'+
      '<td>'+totFgStr+'</td><td>'+totFg3Str+'</td><td>'+totFtStr+'</td>'+
      '<td>'+teamTotals.to+'</td><td>'+teamTotals.oReb+'</td><td>'+teamTotals.dReb+'</td><td>'+totReb+'</td>'+
      '<td>'+teamTotals.ast+'</td><td>'+teamTotals.stl+'</td><td>'+teamTotals.blk+'</td><td>0</td>'+
    '</tr></tbody></table>'+
    '<hr/>'+
    '<h2>'+opp+'</h2>'+
    '<table><thead><tr>'+
      '<th class="left">Team</th><th>PTS</th><th>PF</th><th>FG</th><th>3PT</th><th>FT</th>'+
      '<th>TO</th><th>ORB</th><th>DRB</th><th>REB</th>'+
    '</tr></thead><tbody>'+
    '<tr class="totals"><td class="left">Totals</td>'+
      '<td>'+gameScore.opp+'</td><td>'+(oppTot.foul||0)+'</td>'+
      '<td>'+oppFgStr+'</td><td>'+oppFg3Str+'</td><td>'+oppFtStr+'</td>'+
      '<td>'+(oppTot.to||0)+'</td><td>'+(oppTot.oReb||0)+'</td><td>'+(oppTot.dReb||0)+'</td><td>'+oppReb+'</td>'+
    '</tr></tbody></table>'+
    '<hr/>'+
    '<div class="two-col">'+
      '<div class="mini-box"><h4>Team fouls</h4>'+
        '<table><thead><tr><th class="left"></th>'+pN.map(function(n){return '<th>'+n+'</th>';}).join('')+'<th>Total</th></tr></thead><tbody>'+
          '<tr><td class="left">'+teamMeta.name+'</td>'+pN.map(function(n,i){return '<td>'+teamFoulsPeriod(i)+'</td>';}).join('')+'<td style="font-weight:600;">'+teamTotals.pf+'</td></tr>'+
          '<tr><td class="left">'+opp+'</td>'+pN.map(function(n,i){return '<td>'+oppFoulsPeriod(i)+'</td>';}).join('')+'<td style="font-weight:600;">'+(oppTot.foul||0)+'</td></tr>'+
        '</tbody></table>'+
      '</div>'+
      '<div class="mini-box"><h4>Team matchup</h4>'+
        '<table><thead><tr><th class="left"></th><th>FT</th><th>REB</th><th>TO</th></tr></thead><tbody>'+
          '<tr><td class="left">'+teamMeta.name+'</td><td>'+totFtStr+'</td><td>'+totReb+'</td><td>'+teamTotals.to+'</td></tr>'+
          '<tr><td class="left">'+opp+'</td><td>'+oppFtStr+'</td><td>'+oppReb+'</td><td>'+(oppTot.to||0)+'</td></tr>'+
        '</tbody></table>'+
      '</div>'+
    '</div>'+
    '<div class="footer"><div class="brand">ShotTracker 4.0</div><div class="date">Generated '+new Date().toLocaleDateString()+'</div></div>'+
  '</div>'+
  playerPages+
  '</body></html>';

  var w=window.open('','_blank');
  if(w){
    w.document.write(html);
    w.document.close();
    setTimeout(function(){w.print();},400);
  }
}

  {id:'backup',emoji:'💾',title:'Data Backup',items:['All data is stored locally on your device — no cloud sync.','Tap <strong>📤 Export Backup</strong> on the Team Manager screen regularly.','To move data to a new device: export on the old one, then Import on the new one.','The backup file contains all teams, players, sessions, shots, and play logs.','If you update the app on GitHub, your data is preserved in the browser local storage.']}
];

// ── Team Selector ──────────────────────────────────────────────────────────────
function TeamSelector(props){
  var teams=props.teams,onSelect=props.onSelect,onCreate=props.onCreate,onEdit=props.onEdit,onDelete=props.onDelete,onImport=props.onImport;
  var crState=useState(false);var cr=crState[0],setCr=crState[1];
  var etState=useState(null);var et=etState[0],setEt=etState[1];
  var enState=useState('');var en=enState[0],setEn=enState[1];
  var cdState=useState(false);var cd=cdState[0],setCd=cdState[1];
  var msgState=useState(null);var importMsg=msgState[0],setImportMsg=msgState[1];
  var helpState=useState(false);var helpOpen=helpState[0],setHelpOpen=helpState[1];
  var tabState=useState('teams');var tab=tabState[0],setTab=tabState[1];
  var histTeamState=useState(null);var histTeam=histTeamState[0],setHistTeam=histTeamState[1];
  var fileRef=useRef(null);
  var TC=['#dc2626','#2563eb','#16a34a','#7c3aed','#d97706','#0891b2','#9d174d','#374151'];
  function tc(id){return TC[parseInt(id.slice(-2),36)%TC.length];}

  function getTeamData(team){var d=lsGet(TK(team.id))||{};return {players:d.players||[],sessions:d.sessions||[]};}

  function handleExport(){
    var keys=Object.keys(localStorage).filter(function(k){return k.indexOf('bball-')===0;});
    var data={exportedAt:new Date().toISOString(),version:'v6',mergedTeams:teams,keys:{}};
    keys.forEach(function(k){try{data.keys[k]=JSON.parse(localStorage.getItem(k));}catch(e){}});
    var b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var u=URL.createObjectURL(b);var a=document.createElement('a');
    a.href=u;a.download='shottracker-backup-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
  }
  function handleImportFile(e){
    var file=e.target.files&&e.target.files[0];if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        if(!data.keys) throw new Error('Invalid');
        Object.keys(data.keys).forEach(function(k){
          var v=data.keys[k];var nk=k;
          if(/^bball-teams/.test(k)&&!/^bball-team-/.test(k)) nk='bball-teams-v6';
          var m=k.match(/^bball-team-(?:v\d+-)?(.+)$/);
          if(m&&k.indexOf('-team-')>-1&&k.indexOf('teams')===-1) nk='bball-team-v6-'+m[1];
          if(v&&v.sessions) v.sessions=v.sessions.map(function(s){return Object.assign({foul:0},s);});
          lsSet(nk,v);
        });
        var mt=data.mergedTeams||lsGet('bball-teams-v6')||[];
        if(mt.length>0) lsSet('bball-teams-v6',mt);
        var nt=lsGet('bball-teams-v6')||[];
        onImport(nt);
        setImportMsg('✓ Imported '+nt.length+' team(s)!');
        setTimeout(function(){setImportMsg(null);},4000);
      }catch(err){
        setImportMsg('✗ Import failed — invalid file');
        setTimeout(function(){setImportMsg(null);},4000);
      }
    };
    reader.readAsText(file);e.target.value='';
  }

  return (
    <div style={{minHeight:'100vh',background:T.bg,display:'flex',flexDirection:'column',alignItems:'center',padding:'0 0 40px',maxWidth:520,margin:'0 auto'}}>
      <div style={{width:'100%',background:T.card,borderBottom:'1px solid '+T.border,padding:'44px 20px 16px',textAlign:'center',boxShadow:T.shadow,position:'relative'}}>
        <button onClick={function(){setHelpOpen(true);}} style={{position:'absolute',top:16,right:16,width:36,height:36,borderRadius:18,border:'1px solid '+T.border,background:T.bg,color:T.accent,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,boxShadow:T.shadow}}>❓</button>
        <div style={{fontSize:52,marginBottom:8}}>🏀</div>
        <h1 style={{margin:'0 0 4px',fontSize:26,letterSpacing:4,color:T.t1,textTransform:'uppercase',fontWeight:900}}>Shot Tracker</h1>
        <div style={{fontSize:11,color:T.accent,letterSpacing:3,textTransform:'uppercase',fontWeight:700,marginBottom:14}}>v4.0 · Practice and Game</div>
        <div style={{display:'flex',background:T.bg,borderRadius:10,border:'1px solid '+T.border,overflow:'hidden'}}>
          <button onClick={function(){setTab('teams');setHistTeam(null);}} style={{flex:1,padding:'10px 0',border:'none',cursor:'pointer',background:tab==='teams'?T.accent:'transparent',color:tab==='teams'?'#fff':T.t3,fontSize:11,letterSpacing:2,textTransform:'uppercase',fontWeight:700,transition:'all 0.2s'}}>📋 Teams</button>
          <button onClick={function(){setTab('history');setHistTeam(teams.length===1?teams[0]:null);}} style={{flex:1,padding:'10px 0',border:'none',cursor:'pointer',background:tab==='history'?T.accent:'transparent',color:tab==='history'?'#fff':T.t3,fontSize:11,letterSpacing:2,textTransform:'uppercase',fontWeight:700,transition:'all 0.2s'}}>📅 History</button>
        </div>
      </div>

      {tab==='teams'&&(
        <div style={{width:'100%',padding:'16px 14px 0',display:'flex',flexDirection:'column',gap:10}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:10,letterSpacing:2,color:T.t4,textTransform:'uppercase',fontWeight:700}}>{teams.length>0?teams.length+' Team'+(teams.length!==1?'s':''):''}</div>
            <button onClick={function(){setCr(true);}} style={{padding:'8px 16px',borderRadius:20,border:'none',background:T.accent,color:'#fff',fontSize:11,fontWeight:700,letterSpacing:2,cursor:'pointer',textTransform:'uppercase',boxShadow:'0 2px 8px rgba(255,107,53,0.3)'}}>＋ New Team</button>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={handleExport} style={{flex:1,padding:'9px 0',borderRadius:10,border:'1px solid '+T.border,background:T.card,color:'#7c3aed',fontSize:11,letterSpacing:1,cursor:'pointer',fontWeight:700,boxShadow:T.shadow}}>📤 Export Backup</button>
            <button onClick={function(){if(fileRef.current) fileRef.current.click();}} style={{flex:1,padding:'9px 0',borderRadius:10,border:'1px solid '+T.border,background:T.card,color:T.blue,fontSize:11,letterSpacing:1,cursor:'pointer',fontWeight:700,boxShadow:T.shadow}}>📥 Import Backup</button>
            <input ref={fileRef} type="file" accept=".json" onChange={handleImportFile} style={{display:'none'}}/>
          </div>
          {importMsg&&<div style={{padding:'10px 14px',borderRadius:10,background:importMsg.indexOf('✓')===0?T.greenL:'rgba(220,38,38,0.1)',border:'1px solid '+(importMsg.indexOf('✓')===0?'#86efac':'#fca5a5'),fontSize:12,color:importMsg.indexOf('✓')===0?T.green:T.red,textAlign:'center',fontWeight:700}}>{importMsg}</div>}
          {teams.length===0&&!cr&&(
            <div style={{textAlign:'center',padding:'60px 20px',display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
              <div style={{fontSize:40}}>📋</div>
              <div style={{fontSize:14,color:T.t4,letterSpacing:2,textTransform:'uppercase',fontWeight:700}}>No Teams Yet</div>
              <button onClick={function(){setCr(true);}} style={{padding:'16px 32px',borderRadius:14,border:'none',background:T.accent,color:'#fff',fontSize:14,fontWeight:900,letterSpacing:4,cursor:'pointer',textTransform:'uppercase',boxShadow:'0 4px 20px rgba(255,107,53,0.35)'}}>🏀 Create First Team</button>
            </div>
          )}
          {teams.map(function(t){
            var col=tc(t.id);
            return (
              <div key={t.id} style={{background:T.card,borderRadius:14,border:'1px solid '+T.border,overflow:'hidden',boxShadow:T.shadow}}>
                <div style={{height:4,background:'linear-gradient(90deg,'+col+','+col+'88)'}}/>
                <div style={{padding:'16px',display:'flex',alignItems:'center',gap:14}}>
                  <div style={{width:48,height:48,borderRadius:12,background:col+'18',border:'2px solid '+col+'44',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>🏀</div>
                  <div style={{flex:1,minWidth:0,cursor:'pointer'}} onClick={function(){onSelect(t);}}>
                    <div style={{fontSize:16,fontWeight:900,color:T.t1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</div>
                    <div style={{fontSize:10,color:T.t4,marginTop:3}}>Created {fmtDate(t.createdAt.slice(0,10))}</div>
                    <div style={{display:'flex',gap:10,marginTop:5,flexWrap:'wrap'}}>
                      {t.playerCount>0&&<span style={{fontSize:9,color:col,fontWeight:700}}>👤 {t.playerCount} players</span>}
                      {t.sessionCount>0&&<span style={{fontSize:9,color:T.green,fontWeight:700}}>📊 {t.sessionCount} sessions</span>}
                      {t.totalPoints>0&&<span style={{fontSize:9,color:'#d97706',fontWeight:700}}>⭐ {t.totalPoints} pts</span>}
                    </div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:6,flexShrink:0}}>
                    <button onClick={function(){onSelect(t);}} style={{width:38,height:38,borderRadius:10,border:'none',background:col,color:'#fff',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 8px '+col+'44'}}>▶</button>
                    <button onClick={function(){setEt(t);setEn(t.name);setCd(false);}} style={{width:38,height:38,borderRadius:10,border:'1px solid '+T.border,background:T.card,color:T.t3,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✏️</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {tab==='history'&&(
        <div style={{width:'100%',padding:'16px 14px 0',display:'flex',flexDirection:'column',gap:10}}>
          {teams.length===0&&<div style={{textAlign:'center',padding:'60px 20px',background:T.card,borderRadius:12,border:'1px solid '+T.border}}><div style={{fontSize:36,marginBottom:12}}>📋</div><div style={{fontSize:13,color:T.t4,textTransform:'uppercase',letterSpacing:2}}>No teams yet</div></div>}
          {teams.length>0&&!histTeam&&(
            <React.Fragment>
              <div style={{fontSize:10,color:T.t4,letterSpacing:2,textTransform:'uppercase',fontWeight:700,marginBottom:2}}>Select a team to view history</div>
              {teams.map(function(t){
                var col=tc(t.id);
                return (
                  <button key={t.id} onClick={function(){setHistTeam(t);}}
                    style={{width:'100%',background:T.card,borderRadius:12,border:'1px solid '+T.border,boxShadow:T.shadow,padding:'14px 16px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',textAlign:'left'}}>
                    <div style={{width:10,height:10,borderRadius:'50%',background:col,flexShrink:0}}/>
                    <div style={{flex:1,fontSize:15,fontWeight:900,color:T.t1}}>{t.name}</div>
                    {t.sessionCount>0&&<span style={{fontSize:10,color:T.green,fontWeight:700}}>{t.sessionCount} sessions</span>}
                    <div style={{fontSize:18,color:T.t4}}>›</div>
                  </button>
                );
              })}
            </React.Fragment>
          )}
          {histTeam&&(function(){
            var td=getTeamData(histTeam);
            return (
              <React.Fragment>
                {teams.length>1&&<button onClick={function(){setHistTeam(null);}} style={{background:'none',border:'none',color:T.accent,cursor:'pointer',fontSize:11,letterSpacing:2,padding:0,textTransform:'uppercase',textAlign:'left',fontWeight:700}}>← All Teams</button>}
                <div style={{fontSize:14,fontWeight:900,color:T.t1,letterSpacing:2,textTransform:'uppercase'}}>{histTeam.name}</div>
                <HistoryView teamMeta={histTeam} players={td.players} sessions={td.sessions} onDelSession={function(id){var ns=td.sessions.filter(function(s){return s.id!==id;});lsSet(TK(histTeam.id),Object.assign({},td,{sessions:ns}));setHistTeam(Object.assign({},histTeam));}}/>
              </React.Fragment>
            );
          })()}
        </div>
      )}

      {cr&&<MultiStepTeamModal onDone={function(name,coaches,players){setCr(false);onCreate(name,coaches,players);}} onCancel={function(){setCr(false);}}/>}

      {et&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:20}}>
          <div style={{background:T.card,borderRadius:20,padding:24,width:'100%',maxWidth:380,boxShadow:T.shadowMd,display:'flex',flexDirection:'column',gap:14,animation:'popin 0.15s ease'}}>
            {!cd?(
              <React.Fragment>
                <div style={{fontSize:14,fontWeight:900,color:T.t1,textAlign:'center',letterSpacing:2,textTransform:'uppercase'}}>Edit Team</div>
                <input value={en} onChange={function(e){setEn(e.target.value);}} maxLength={30} style={{width:'100%',boxSizing:'border-box',background:T.bg,border:'1px solid '+T.border,borderRadius:12,padding:'14px',color:T.t1,fontSize:18,fontWeight:700,outline:'none',textAlign:'center'}}/>
                <div style={{display:'flex',gap:10}}>
                  <button onClick={function(){setEt(null);}} style={{flex:1,padding:'13px 0',borderRadius:12,border:'1px solid '+T.border,background:T.card,color:T.t2,fontSize:13,cursor:'pointer'}}>Cancel</button>
                  <button onClick={function(){if(en.trim()){onEdit(et.id,en.trim());setEt(null);}}} disabled={!en.trim()} style={{flex:2,padding:'13px 0',borderRadius:12,border:'none',background:en.trim()?T.accent:'#e5e7eb',color:en.trim()?'#fff':T.t4,fontSize:14,fontWeight:700,cursor:'pointer',letterSpacing:2,textTransform:'uppercase'}}>Save</button>
                </div>
                <button onClick={function(){setCd(true);}} style={{padding:'11px 0',borderRadius:12,border:'1px solid #fecaca',background:'#fef2f2',color:T.red,fontSize:11,letterSpacing:2,cursor:'pointer',textTransform:'uppercase',fontWeight:700}}>Delete "{et.name}"</button>
              </React.Fragment>
            ):(
              <React.Fragment>
                <div style={{fontSize:13,fontWeight:700,color:T.red,textAlign:'center'}}>Delete "{et.name}"?</div>
                <div style={{fontSize:11,color:T.t3,textAlign:'center',lineHeight:1.7}}>All data will be permanently deleted.</div>
                <div style={{display:'flex',gap:10}}>
                  <button onClick={function(){setCd(false);}} style={{flex:1,padding:'13px 0',borderRadius:12,border:'1px solid '+T.border,background:T.card,color:T.t2,fontSize:13,cursor:'pointer'}}>Cancel</button>
                  <button onClick={function(){onDelete(et.id);setEt(null);setCd(false);}} style={{flex:1,padding:'13px 0',borderRadius:12,border:'none',background:T.red,color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer'}}>Delete</button>
                </div>
              </React.Fragment>
            )}
          </div>
        </div>
      )}
      {helpOpen&&<HelpModal onClose={function(){setHelpOpen(false);}}/>}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
function App(){
  var teamsState=useState(function(){return lsGet(TLK)||[];});
  var teams=teamsState[0],setTeams=teamsState[1];
  var activeTeamState=useState(null);
  var activeTeam=activeTeamState[0],setActiveTeam=activeTeamState[1];
  var sessionTypeState=useState(null);
  var sessionType=sessionTypeState[0],setSessionType=sessionTypeState[1];
  var opponentState=useState(null);
  var opponent=opponentState[0],setOpponent=opponentState[1];
  var numPeriodsState=useState(4);
  var numPeriods=numPeriodsState[0],setNumPeriods=numPeriodsState[1];

  function saveTeams(list){setTeams(list);lsSet(TLK,list);}
  function getTeamFullData(id){return lsGet(TK(id))||{players:[],sessions:[],coaches:{head:emptyCoach(),assistants:[]},schedule:[]};}

  function onCreate(name,coaches,players){
    var t={id:uid(),name:name,createdAt:new Date().toISOString(),playerCount:players.length,sessionCount:0,totalPoints:0};
    lsSet(TK(t.id),{players:players||[],sessions:[],coaches:coaches||{head:emptyCoach(),assistants:[]},schedule:[]});
    saveTeams(teams.concat([t]));
    setActiveTeam(t);
  }
  function onEdit(id,name){saveTeams(teams.map(function(t){return t.id===id?Object.assign({},t,{name:name}):t;}));if(activeTeam&&activeTeam.id===id) setActiveTeam(function(a){return Object.assign({},a,{name:name});});}
  function onDelete(id){saveTeams(teams.filter(function(t){return t.id!==id;}));lsDel(TK(id));if(activeTeam&&activeTeam.id===id){setActiveTeam(null);setSessionType(null);setOpponent(null);}}
  function onImport(nt){setTeams(nt);}
  function onMeta(id,u){setTeams(function(prev){var n=prev.map(function(t){return t.id===id?Object.assign({},t,u):t;});lsSet(TLK,n);return n;});}
  function handleBack(){if(sessionType!==null){setSessionType(null);setOpponent(null);}else{setActiveTeam(null);}}

  function handleUpdateTeamData(updates){
    if(!activeTeam) return;
    var current=getTeamFullData(activeTeam.id);
    var merged=Object.assign({},current,updates);
    lsSet(TK(activeTeam.id),merged);
    if(updates.players){onMeta(activeTeam.id,{playerCount:updates.players.length});}
  }

  if(!activeTeam) return <TeamSelector teams={teams} onSelect={function(t){setActiveTeam(t);setSessionType(null);setOpponent(null);}} onCreate={onCreate} onEdit={onEdit} onDelete={onDelete} onImport={onImport}/>;

  if(!sessionType){
    var td=getTeamFullData(activeTeam.id);
    return <SessionTypeScreen
      teamMeta={activeTeam}
      teamData={td}
      onStartSession={function(type,opts){
        setSessionType(type);
        setOpponent(type==='Practice'?'':((opts&&opts.opponent)||'Opponent'));
        setNumPeriods((opts&&opts.numPeriods)||4);
      }}
      onUpdateData={handleUpdateTeamData}
      onBack={handleBack}
    />;
  }

  var teamData=getTeamFullData(activeTeam.id);
  return (
    <Tracker
      key={activeTeam.id+'-'+sessionType+'-'+(opponent||'')}
      teamMeta={activeTeam}
      players={teamData.players||[]}
      sessionType={sessionType}
      opponent={opponent||''}
      numPeriods={numPeriods}
      sessions={teamData.sessions||[]}
      onBack={handleBack}
      onPersist={function(u){onMeta(activeTeam.id,u);}}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
</body>
</html>
